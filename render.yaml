services:
  # ── Backend: FastAPI ─────────────────────────────────────────────────────────
  - type: web
    name: feetbusiness-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Handmatig instellen: gebruik Neon PostgreSQL connection string
